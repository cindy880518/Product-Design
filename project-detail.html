<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案詳細頁</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif; background: #010817; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.74); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .tag { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1rem; border-radius: 1rem; background: rgba(15,23,42,0.72); border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="antialiased">
    <div class="min-h-screen px-6 py-10">
        <div class="max-w-6xl mx-auto">
            <nav class="flex flex-wrap items-center justify-between gap-4 mb-10">
                <a href="PD.html" class="inline-flex items-center gap-2 text-slate-200 hover:text-white">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> 返回作品集
                </a>
                <!-- <a href="project-manager.html" class="inline-flex items-center gap-2 bg-cyan-500 hover:bg-cyan-600 text-slate-950 px-4 py-3 rounded-2xl font-bold transition">
                    <i data-lucide="edit-3" class="w-4 h-4"></i> 開啟管理器
                </a> -->
            </nav>
            <div id="projectContent" class="space-y-10"></div>
        </div>
    </div>
    <script>
        lucide.createIcons();

        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function loadProjects() {
            const saved = localStorage.getItem('pm4Projects');
            if (!saved) return null;
            return JSON.parse(saved);
        }

        const defaultProjects = [
            {
                id: 'app',
                title: 'JetFi eSIM App 首頁重構策略',
                categoryLabel: 'Enterprise SaaS',
                image: 'https://duk.tw/HzMCYM.jpg',
                description: '優化APP首頁，解決跨部門數據孤島問題。',
                metrics: [
                    { label: '下載量提升', value: '+45%' },
                    { label: 'CTR 提升', value: '+30%' },
                    { label: '用戶滿意度', value: '4.8/5' }
                ],
                detailContent: '<h2 class="text-3xl font-bold mb-6">專案概述</h2><p class="text-slate-300 leading-relaxed mb-6">這裡是 JetFi eSIM App 的內頁說明內容。你可以從管理器編輯這段內容，包含圖文、標題與段落。</p>'
            },
            {
                id: 'abtest',
                title: 'KDDI 原生eSIM 數位廣告',
                categoryLabel: 'Growth PM Case Study',
                image: 'https://duk.tw/pV3r3X.jpg',
                description: '12 月份累積投放數據分析：透過「增長漏斗」與「三維度素材模型」佈局。',
                metrics: [
                    { label: 'ROAS', value: '3.2x' },
                    { label: '轉化率', value: '+85%' },
                    { label: '成本節省', value: '-25%' }
                ],
                detailContent: '<h2 class="text-3xl font-bold mb-6">專案亮點</h2><p class="text-slate-300 leading-relaxed mb-6">這裡是 KDDI 原生eSIM 的內頁說明內容。你可以在管理器填入專案細節、策略、成效資料。</p>'
            },
            {
                id: 'meta',
                title: 'Meta 廣告投遞優化',
                categoryLabel: 'Growth Marketing',
                image: 'https://duk.tw/Qet6p6.jpg',
                description: '利用科學實驗方法論，驗證素材賣點，達成 4.8x ROAS。',
                metrics: [
                    { label: 'ROAS', value: '4.8x' },
                    { label: 'CPM 降低', value: '-40%' },
                    { label: '轉化率', value: '+120%' }
                ],
                detailContent: '<h2 class="text-3xl font-bold mb-6">專案洞察</h2><p class="text-slate-300 leading-relaxed mb-6">這裡是 Meta 廣告投遞優化的細節區塊。你可編輯圖片、文字、數據等內容。</p>'
            },
            {
                id: 'kol',
                title: 'KOL 影響者媒合與成效優化',
                categoryLabel: 'KOL',
                image: 'https://duk.tw/Ykn6EF.jpg',
                description: '優化企業報表自動化，解決跨部門數據孤島問題。',
                metrics: [
                    { label: 'ROAS', value: '3.4x' },
                    { label: '下載提升', value: '+500%' },
                    { label: 'KOL 簽約', value: '10+' }
                ],
                detailContent: '<h2 class="text-3xl font-bold mb-6">專案摘要</h2><p class="text-slate-300 leading-relaxed mb-6">這裡是 KOL 影響者媒合的詳情。可在管理器中直接編輯此內頁內容。</p>'
            }
        ];

        function renderProject(project) {
            const defaultSection = `<div class="text-slate-400 text-lg leading-relaxed">此專案目前沒有內頁內容，請前往管理器新增。</div>`;
            const sectionHtml = project.detailContent || defaultSection;

            document.getElementById('projectContent').innerHTML = `
                <div class="rounded-[2rem] glass-card p-8 lg:p-12">
                    <div class="flex flex-col lg:flex-row gap-10 items-center">
                        <div class="lg:w-1/2">
                            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-cyan-500/10 text-cyan-200 text-xs uppercase tracking-[0.2em] mb-6">
                                <span>${project.categoryLabel}</span>
                            </div>
                            <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">${project.title}</h1>
                            <p class="text-slate-300 text-lg leading-relaxed mb-8">${project.description}</p>
                            <div class="flex flex-wrap gap-3">
                                ${project.metrics.map(m => `<div class="tag"><span class="font-bold text-white">${m.value}</span><span class="text-slate-400 text-xs">${m.label}</span></div>`).join('')}
                            </div>
                        </div>
                        <div class="lg:w-1/2">
                            <div class="overflow-hidden rounded-[2rem] border border-white/10 shadow-2xl">
                                <img src="${project.image}" alt="${project.title}" class="w-full h-full object-cover">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="grid gap-10 lg:grid-cols-[1.4fr_0.6fr]">
                    <div class="space-y-10">
                        <div class="glass-card p-8 rounded-[2rem]">
                            ${sectionHtml}
                        </div>
                    </div>
                    <div class="space-y-6">
                        <div class="glass-card p-8 rounded-[2rem]">
                            <h2 class="text-2xl font-bold text-white mb-4">亮點</h2>
                            <div class="flex flex-wrap gap-3">
                                ${(project.highlights || []).map(tag => `<span class="tag text-slate-200">${tag}</span>`).join('')}
                            </div>
                        </div>
                        <div class="glass-card p-8 rounded-[2rem]">
                            <h2 class="text-2xl font-bold text-white mb-4">可編輯提示</h2>
                            <p class="text-slate-400 leading-relaxed">如果要在內頁中插入更多區塊，請在管理器內使用 HTML 標籤，例如 &lt;h3&gt;、&lt;p&gt;、&lt;ul&gt; 等。</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderError() {
            document.getElementById('projectContent').innerHTML = `
                <div class="rounded-[2rem] glass-card p-12 text-center">
                    <p class="text-slate-400 text-lg">找不到專案資料，請確認網址是否包含正確的 id，或先前往 <a href="project-manager.html" class="text-cyan-400 underline">管理器</a> 新增專案。</p>
                </div>
            `;
        }

        const projectId = getQueryParam('id');
        const projects = loadProjects() || defaultProjects;
        const project = projects.find(p => p.id === projectId);
        if (project) {
            renderProject(project);
        } else {
            renderError();
        }
    </script>
</body>
</html>
